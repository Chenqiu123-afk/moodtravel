<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
  <meta name="theme-color" content="#F5F2ED" />
  <title>MoodTravel - 情绪旅行</title>

  <!-- 字体：Montserrat (标题) + Inter (正文) + Playfair Display (衬线点缀) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    rel="stylesheet"
  />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }
    body {
      font-family: 'Inter', 'PingFang SC', 'Hiragino Sans GB', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
    }
    /* 字体加载中不闪烁 */
    .fonts-loading body { font-family: 'PingFang SC', 'Hiragino Sans GB', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
